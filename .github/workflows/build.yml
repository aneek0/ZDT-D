name: Build ZDT-D

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

concurrency:
  group: zdt-d-service-build
  cancel-in-progress: true

env:
  ANDROID_API_LEVEL: 36
  ZDT_COMPILE_SDK: 36
  ANDROID_BUILD_TOOLS_VERSION: "36.0.0"
  GRADLE_VERSION: "9.4.1"
  CARGO_PROFILE: release
  CARGO_BUILD_TARGET: aarch64-linux-android
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  NO_DASHBOARD: "1"

permissions:
  contents: write
  models: read

jobs:
  check_paths:
    name: Check tracked changes
    runs-on: ubuntu-latest
    outputs:
      paths_changed: ${{ steps.detect.outputs.paths_changed }}
      reason: ${{ steps.detect.outputs.reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect tracked build paths
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          paths_changed=false
          reason="No tracked build paths changed"
          changed_files=""

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            reason="Manual workflow_dispatch run; path check is bypassed by build gate"
          else
            base="$BEFORE_SHA"
            head="$HEAD_SHA"

            if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              if git rev-parse "${head}^" >/dev/null 2>&1; then
                base="$(git rev-parse "${head}^")"
              else
                base=""
              fi
            fi

            if [[ -n "$base" ]]; then
              changed_files="$(git diff --name-only "$base" "$head" || true)"
            else
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$head" || true)"
            fi

            if printf '%s\n' "$changed_files" | grep -Eq '^(application/|zygisk/|rust/|module_template/|prebuilt/|module\.prop$)'; then
              paths_changed=true
              reason="Tracked build paths changed"
            fi
          fi

          {
            echo "### Check tracked changes"
            echo
            echo "Paths changed: \`$paths_changed\`"
            echo "Reason: $reason"
            echo
            echo "Tracked paths:"
            echo "- application/**"
            echo "- zygisk/**"
            echo "- rust/**"
            echo "- module_template/**"
            echo "- prebuilt/**"
            echo "- module.prop"
            if [[ -n "$changed_files" ]]; then
              echo
              echo "Changed files:"
              printf '%s\n' "$changed_files" | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "paths_changed=$paths_changed" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

  check_force_phrase:
    name: Check manual compile phrase
    runs-on: ubuntu-latest
    outputs:
      force_compile: ${{ steps.detect.outputs.force_compile }}
      reason: ${{ steps.detect.outputs.reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect force phrase
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          FORCE_PHRASE: auto run compile
        run: |
          set -euo pipefail

          force_compile=false
          reason="Force phrase not found"
          commit_messages=""

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            reason="Manual workflow_dispatch run; force phrase check is bypassed by build gate"
          else
            base="$BEFORE_SHA"
            head="$HEAD_SHA"

            if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              if git rev-parse "${head}^" >/dev/null 2>&1; then
                base="$(git rev-parse "${head}^")"
              else
                base=""
              fi
            fi

            if [[ -n "$base" ]]; then
              commit_messages="$(git log --format=%B "${base}..${head}" || true)"
            else
              commit_messages="$(git log -1 --format=%B "$head" || true)"
            fi

            if printf '%s\n' "$commit_messages" | grep -qiF "$FORCE_PHRASE"; then
              force_compile=true
              reason="Commit message contains '$FORCE_PHRASE'"
            fi
          fi

          {
            echo "### Check manual compile phrase"
            echo
            echo "Force compile: \`$force_compile\`"
            echo "Reason: $reason"
            echo
            echo "Force phrase: \`$FORCE_PHRASE\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "force_compile=$force_compile" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

  build_gate:
    name: ZDT-D build gate
    runs-on: ubuntu-latest
    needs:
      - check_paths
      - check_force_phrase
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
      reason: ${{ steps.gate.outputs.reason }}
      build_start_ts: ${{ steps.gate.outputs.build_start_ts }}

    steps:
      - name: Decide whether to compile
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          PATHS_CHANGED: ${{ needs.check_paths.outputs.paths_changed }}
          FORCE_COMPILE: ${{ needs.check_force_phrase.outputs.force_compile }}
          PATH_REASON: ${{ needs.check_paths.outputs.reason }}
          FORCE_REASON: ${{ needs.check_force_phrase.outputs.reason }}
        run: |
          set -euo pipefail

          should_build=false
          reason="No build-related changes detected"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            should_build=true
            reason="Manual workflow_dispatch run"
          elif [[ "$FORCE_COMPILE" == "true" ]]; then
            should_build=true
            reason="$FORCE_REASON"
          elif [[ "$PATHS_CHANGED" == "true" ]]; then
            should_build=true
            reason="$PATH_REASON"
          fi

          build_start_ts="$(date +%s)"

          {
            echo "### ZDT-D build gate"
            echo
            echo "Should build: \`$should_build\`"
            echo "Reason: $reason"
            echo
            echo "Inputs:"
            echo "- Tracked paths changed: \`$PATHS_CHANGED\`"
            echo "- Force phrase matched: \`$FORCE_COMPILE\`"
            echo "- Event: \`$EVENT_NAME\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "build_start_ts=$build_start_ts" >> "$GITHUB_OUTPUT"

          echo "should_build=$should_build"
          echo "reason=$reason"

  build_rust_binaries:
    name: Build Rust binaries
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK cross-linker
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          ANDROID_CC="$NDK_BIN/aarch64-linux-android21-clang"
          ANDROID_CXX="$NDK_BIN/aarch64-linux-android21-clang++"
          ANDROID_AR="$NDK_BIN/llvm-ar"
          ANDROID_RANLIB="$NDK_BIN/llvm-ranlib"

          test -x "$ANDROID_CC" || { echo "::error::Android C compiler not found: $ANDROID_CC"; exit 1; }
          test -x "$ANDROID_CXX" || { echo "::error::Android C++ compiler not found: $ANDROID_CXX"; exit 1; }
          test -x "$ANDROID_AR" || { echo "::error::Android archiver not found: $ANDROID_AR"; exit 1; }
          test -x "$ANDROID_RANLIB" || { echo "::error::Android ranlib not found: $ANDROID_RANLIB"; exit 1; }

          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_CC"
            echo "CC_aarch64_linux_android=$ANDROID_CC"
            echo "CXX_aarch64_linux_android=$ANDROID_CXX"
            echo "AR_aarch64_linux_android=$ANDROID_AR"
            echo "RANLIB_aarch64_linux_android=$ANDROID_RANLIB"
          } >> "$GITHUB_ENV"

          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<EOF2
          [target.aarch64-linux-android]
          linker = "$ANDROID_CC"
          ar = "$ANDROID_AR"
          EOF2

      - name: Cache Cargo registry and Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-rust-binaries-aarch64-linux-android-${{ hashFiles('rust/**/Cargo.lock') }}
          restore-keys: |
            cargo-rust-binaries-aarch64-linux-android-
            cargo-aarch64-linux-android-

      - name: Verify Android Rust cross toolchain
        run: |
          set -euo pipefail
          echo "NDK_ROOT=$NDK_ROOT"
          "$CC_aarch64_linux_android" --version | head -1
          "$AR_aarch64_linux_android" --version | head -1
          rustc --print target-list | grep -qx '${{ env.CARGO_BUILD_TARGET }}'
          cargo -V
          rustc -V

      - name: Build all Rust binaries
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/rust/target
          RUSTUP_HOME: ""
          RUSTUP_TOOLCHAIN: ""
          RUSTFLAGS: ""
          CARGO_ENCODED_RUSTFLAGS: ""
          RUSTC_WRAPPER: ""
        run: |
          set -euo pipefail
          cargo build --manifest-path rust/zdtd/Cargo.toml --profile "${{ env.CARGO_PROFILE }}" --target "${{ env.CARGO_BUILD_TARGET }}"
          cargo build --manifest-path rust/T2s/Cargo.toml --profile "${{ env.CARGO_PROFILE }}" --target "${{ env.CARGO_BUILD_TARGET }}"
          cargo build --manifest-path rust/dpi-detector/Cargo.toml --profile "${{ env.CARGO_PROFILE }}" --target "${{ env.CARGO_BUILD_TARGET }}"
          cargo build --manifest-path rust/nfqws-tester/Cargo.toml --profile "${{ env.CARGO_PROFILE }}" --target "${{ env.CARGO_BUILD_TARGET }}"

      - name: Collect Rust binaries
        run: |
          set -euo pipefail
          SRC="rust/target/${{ env.CARGO_BUILD_TARGET }}/${{ env.CARGO_PROFILE }}"
          DST="out/artifacts/rust"
          mkdir -p "$DST"
          cp -f "$SRC/zdtd" "$DST/zdtd"
          cp -f "$SRC/t2s" "$DST/t2s"
          cp -f "$SRC/dpi-detector" "$DST/dpi-detector"
          cp -f "$SRC/nfqws-tester" "$DST/nfqws-tester"
          chmod 755 "$DST/zdtd" "$DST/t2s" "$DST/dpi-detector" "$DST/nfqws-tester"
          ls -lh "$DST"

      - name: Upload Rust binaries
        uses: actions/upload-artifact@v7
        with:
          name: zdt-rust-binaries
          path: out/artifacts/rust/
          retention-days: 1

  build_zygisk:
    name: Compile Zygisk module
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          echo "NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_ROOT" >> "$GITHUB_ENV"

      - name: Build Zygisk arm64-v8a
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_ROOT: ${{ env.NDK_ROOT }}
          NDK_ROOT: ${{ env.NDK_ROOT }}
          ANDROID_API_LEVEL: 24
        run: |
          set -euo pipefail
          mkdir -p out/zygisk
          ./zygisk/build.sh out/zygisk/arm64-v8a.so
          file out/zygisk/arm64-v8a.so
          test -s out/zygisk/arm64-v8a.so
          readelf -Ws out/zygisk/arm64-v8a.so | grep -q ' zygisk_module_entry$'
          if readelf -d out/zygisk/arm64-v8a.so | grep -E 'NEEDED.*(libc\+\+|libstdc\+\+)' >/dev/null 2>&1; then
            echo "::error::Zygisk binary must not depend on C++ STL runtime"
            exit 1
          fi

      - name: Upload Zygisk binary
        uses: actions/upload-artifact@v7
        with:
          name: zygisk-arm64
          path: out/zygisk/arm64-v8a.so
          retention-days: 1

  pack_module:
    name: Pack ZDT-D module
    runs-on: ubuntu-latest
    needs:
      - build_rust_binaries
      - build_zygisk
    if: needs.build_rust_binaries.result == 'success' && needs.build_zygisk.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Rust binaries
        uses: actions/download-artifact@v7
        with:
          name: zdt-rust-binaries
          path: out/artifacts/rust

      - name: Download Zygisk binary
        uses: actions/download-artifact@v7
        with:
          name: zygisk-arm64
          path: out/zygisk

      - name: Check prebuilt binaries
        run: |
          REQUIRED=(byedpi dnscrypt dpitunnel-cli nfqws nfqws2 opera-proxy sing-box mieru wireproxy torproxy lyrebird tun2socks openvpn mihomo amneziawg-go awg)
          MISSING=()
          for bin in "${REQUIRED[@]}"; do
            [[ -f "prebuilt/bin/arm64-v8a/$bin" ]] || MISSING+=("$bin")
          done
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Binaries doesn't exist: ${MISSING[*]}"
            exit 1
          fi
          echo "All binaries found"

      - name: Pack Magisk module archive
        run: |
          set -euo pipefail

          MODULE_BUILD_DIR="out/module_build/module_root"
          MODULE_ZIP="out/module/zdt_module.zip"
          PREBUILT="prebuilt/bin/arm64-v8a"
          ZDTD_BIN="out/artifacts/rust/zdtd"
          T2S_BIN="out/artifacts/rust/t2s"
          ZYGISK_SO="out/zygisk/arm64-v8a.so"

          test -s "$ZDTD_BIN" || { echo "::error::zdtd artifact missing: $ZDTD_BIN"; exit 1; }
          test -s "$T2S_BIN" || { echo "::error::t2s artifact missing: $T2S_BIN"; exit 1; }
          test -s "$ZYGISK_SO" || { echo "::error::Zygisk artifact missing: $ZYGISK_SO"; exit 1; }

          rm -rf out/module_build
          mkdir -p "$MODULE_BUILD_DIR" out/module

          cp -a module_template/. "$MODULE_BUILD_DIR/"
          cp -f module.prop "$MODULE_BUILD_DIR/module.prop"

          [[ -d "$MODULE_BUILD_DIR/META-INF" ]] || { echo "::error::META-INF doesnt exist in module_template"; exit 1; }
          find "$MODULE_BUILD_DIR" -name .gitkeep -type f -delete 2>/dev/null || true
          rm -f "$MODULE_BUILD_DIR/zygisk/unloaded" 2>/dev/null || true

          mkdir -p "$MODULE_BUILD_DIR/bin" "$MODULE_BUILD_DIR/zygisk"
          cp -f "$ZYGISK_SO" "$MODULE_BUILD_DIR/zygisk/arm64-v8a.so" && chmod 644 "$MODULE_BUILD_DIR/zygisk/arm64-v8a.so"

          cp -f "$ZDTD_BIN" "$MODULE_BUILD_DIR/bin/zdtd" && chmod 755 "$MODULE_BUILD_DIR/bin/zdtd"
          cp -f "$T2S_BIN"  "$MODULE_BUILD_DIR/bin/t2s"  && chmod 755 "$MODULE_BUILD_DIR/bin/t2s"
          for bin in byedpi dnscrypt dpitunnel-cli nfqws nfqws2 opera-proxy sing-box mieru wireproxy torproxy lyrebird tun2socks openvpn mihomo amneziawg-go awg; do
            cp -f "$PREBUILT/$bin" "$MODULE_BUILD_DIR/bin/$bin" && chmod 755 "$MODULE_BUILD_DIR/bin/$bin"
          done

          pushd "$MODULE_BUILD_DIR" > /dev/null
          zip -qr "../../../$MODULE_ZIP" .
          popd > /dev/null

          ZIP_ENTRIES="$(unzip -Z1 "$MODULE_ZIP" 2>/dev/null)" || { echo "::error::Unable to read module zip"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'zygisk/arm64-v8a.so' >/dev/null || { echo "::error::Zygisk binary missing in module zip"; exit 1; }
          if printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'bin/dpi-detector' >/dev/null; then
            echo "::error::dpi-detector must not be packed into module zip; it belongs to APK assets"
            exit 1
          fi
          if printf '%s\n' "$ZIP_ENTRIES" | grep -E '(^|/)(unloaded|\.gitkeep)$' >/dev/null; then
            echo "::error::unloaded or .gitkeep leaked into module zip"
            exit 1
          fi

          ls -lh "$MODULE_ZIP"

      - name: Upload module archive
        uses: actions/upload-artifact@v7
        with:
          name: zdt-module-zip
          path: out/module/zdt_module.zip
          retention-days: 1

  build_apk:
    name: Build Android application
    runs-on: ubuntu-latest
    needs:
      - pack_module
      - build_rust_binaries
    if: needs.pack_module.result == 'success' && needs.build_rust_binaries.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${{ env.ANDROID_API_LEVEL }}" \
            "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}"

      - name: Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Download module archive
        uses: actions/download-artifact@v7
        with:
          name: zdt-module-zip
          path: out/module

      - name: Download Rust binaries
        uses: actions/download-artifact@v7
        with:
          name: zdt-rust-binaries
          path: out/artifacts/rust

      - name: Locate Android project root
        run: |
          SETTINGS=$(find . -maxdepth 4 \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) \
            | grep -v '/build/' | sort | head -1)
          if [[ -z "$SETTINGS" ]]; then
            echo "::error::settings.gradle dont found:"
            find . -maxdepth 4 -name '*.gradle*' | sort
            exit 1
          fi
          GRADLE_PROJECT_DIR=$(dirname "$SETTINGS")
          echo "GRADLE_PROJECT_DIR=$GRADLE_PROJECT_DIR" >> $GITHUB_ENV
          echo "Android project root: $GRADLE_PROJECT_DIR"
          test -s out/module/zdt_module.zip || { echo "::error::Downloaded module zip is missing"; exit 1; }

      - name: Write local.properties & restore signing keystore
        env:
          ZDT_KEYSTORE_BASE64: ${{ secrets.ZDT_KEYSTORE_BASE64 }}
          ZDT_KEYSTORE_PASSWORD: ${{ secrets.ZDT_KEYSTORE_PASSWORD }}
          ZDT_KEY_ALIAS: ${{ secrets.ZDT_KEY_ALIAS }}
          ZDT_KEY_PASSWORD: ${{ secrets.ZDT_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$GRADLE_PROJECT_DIR/local.properties"

          for name in ZDT_KEYSTORE_BASE64 ZDT_KEYSTORE_PASSWORD ZDT_KEY_ALIAS ZDT_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name GitHub Actions secret is missing or empty"
              exit 1
            fi
          done

          KEYSTORE_PATH="$(pwd)/keystores/zdt-debug.keystore"
          mkdir -p "$(dirname "$KEYSTORE_PATH")"

          printf '%s' "$ZDT_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$ZDT_KEYSTORE_PASSWORD" \
            -alias "$ZDT_KEY_ALIAS" \
            >/dev/null

          {
            echo "storeFile=$KEYSTORE_PATH"
            echo "storePassword=$ZDT_KEYSTORE_PASSWORD"
            echo "keyAlias=$ZDT_KEY_ALIAS"
            echo "keyPassword=$ZDT_KEY_PASSWORD"
          } > "$GRADLE_PROJECT_DIR/keystore.properties"

      - name: Prepare dpi-detector APK asset
        run: |
          set -euo pipefail
          SRC="out/artifacts/rust/dpi-detector"
          DST="application/app/build/generated/zdt-assets/main/dpi-detector/arm64-v8a/dpi-detector"
          test -s "$SRC" || { echo "::error::dpi-detector artifact missing: $SRC"; exit 1; }
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          chmod 755 "$DST"
          ls -lh "$DST"

      - name: Prepare nfqws_tester APK asset
        run: |
          set -euo pipefail
          SRC="out/artifacts/rust/nfqws-tester"
          DST="application/app/build/generated/zdt-assets/main/nfqws-tester/arm64-v8a/nfqws_tester"
          test -s "$SRC" || { echo "::error::nfqws_tester artifact missing: $SRC"; exit 1; }
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          chmod 755 "$DST"
          ls -lh "$DST"

      - name: Build APK assemble${{ env.BUILD_TYPE }}
        working-directory: ${{ env.GRADLE_PROJECT_DIR }}
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: |
          gradle \
            --no-daemon \
            --max-workers=$(nproc) \
            "-PzdtCompileSdk=${{ env.ZDT_COMPILE_SDK }}" \
            "assemble${{ env.BUILD_TYPE }}"

      - name: Collect final artifacts
        run: |
          set -euo pipefail
          mkdir -p out/dist

          APK=$(find "$GRADLE_PROJECT_DIR" -path '*/build/outputs/apk/*.apk' -type f | sort | tail -1)
          [[ -n "$APK" ]] || { echo "::error::APK does not exist"; exit 1; }

          APK_ENTRIES="$(unzip -Z1 "$APK" 2>/dev/null)" || { echo "::error::Unable to read APK: $APK"; exit 1; }
          if ! printf '%s\n' "$APK_ENTRIES" | grep -Fx 'AndroidManifest.xml' >/dev/null; then
            echo "::error::Gradle output is not an installable APK or AndroidManifest.xml is missing: $APK"
            printf '%s\n' "$APK_ENTRIES" | head -80 || true
            exit 1
          fi
          printf '%s\n' "$APK_ENTRIES" | grep -Fx 'assets/dpi-detector/arm64-v8a/dpi-detector' >/dev/null || { echo "::error::dpi-detector APK asset missing"; exit 1; }
          printf '%s\n' "$APK_ENTRIES" | grep -Fx 'assets/nfqws-tester/arm64-v8a/nfqws_tester' >/dev/null || { echo "::error::nfqws_tester APK asset missing"; exit 1; }

          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/${{ env.ANDROID_BUILD_TOOLS_VERSION }}/apksigner"
          [[ -x "$APKSIGNER" ]] || { echo "::error::apksigner not found: $APKSIGNER"; exit 1; }
          "$APKSIGNER" verify --verbose "$APK"

          cp -f "$APK" out/dist/app-release.apk
          cp -f out/module/zdt_module.zip out/dist/zdt_module.zip

          ls -lh out/dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: zdt-apk
          path: out/dist/app-release.apk
          retention-days: 30

      - name: Upload module artifact
        uses: actions/upload-artifact@v7
        with:
          name: zdt-module-final
          path: out/dist/zdt_module.zip
          retention-days: 30

  publish_service:
    name: Tag build artifacts
    runs-on: ubuntu-latest
    needs:
      - build_gate
      - build_apk
    if: github.ref == 'refs/heads/main' && needs.build_apk.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v7
        with:
          name: zdt-apk
          path: out/dist

      - name: Download module artifact
        uses: actions/download-artifact@v7
        with:
          name: zdt-module-final
          path: out/dist

      - name: Rename artifacts and create build tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          FULL_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          BUILD_TIME="$(date -u '+%Y%m%d-%H%M%S')"
          TAG="build-${SHORT_SHA}-${BUILD_TIME}"

          cp -f out/dist/app-release.apk "out/dist/ZDT-D-${TAG}.apk"
          cp -f out/dist/zdt_module.zip "out/dist/ZDT-D-module-${TAG}.zip"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "$FULL_SHA"
          push_output="$(git push origin "refs/tags/${TAG}" 2>&1)" || {
            if echo "$push_output" | grep -qi "already exists"; then
              echo "::warning::Tag $TAG already exists, continuing with existing tag."
            else
              echo "$push_output"
              exit 1
            fi
          }

          echo "tag=$TAG"
          echo "Created build tag: $TAG"
          echo "APK: ZDT-D-${TAG}.apk"
          echo "Module: ZDT-D-module-${TAG}.zip"
