name: Build ZDT-D

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

concurrency:
  group: zdt-d-service-build
  cancel-in-progress: true

env:
  ANDROID_API_LEVEL: 36
  ZDT_COMPILE_SDK: 36
  ANDROID_BUILD_TOOLS_VERSION: "36.0.0"
  GRADLE_VERSION: "9.4.1"
  CARGO_PROFILE: release
  CARGO_BUILD_TARGET: aarch64-linux-android
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Release' }}
  NO_DASHBOARD: "1"

permissions:
  contents: write
  models: read

jobs:
  check_paths:
    name: Check tracked changes
    runs-on: ubuntu-latest
    outputs:
      paths_changed: ${{ steps.detect.outputs.paths_changed }}
      reason: ${{ steps.detect.outputs.reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect tracked build paths
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          paths_changed=false
          reason="No tracked build paths changed"
          changed_files=""

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            reason="Manual workflow_dispatch run; path check is bypassed by build gate"
          else
            base="$BEFORE_SHA"
            head="$HEAD_SHA"

            if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              if git rev-parse "${head}^" >/dev/null 2>&1; then
                base="$(git rev-parse "${head}^")"
              else
                base=""
              fi
            fi

            if [[ -n "$base" ]]; then
              changed_files="$(git diff --name-only "$base" "$head" || true)"
            else
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$head" || true)"
            fi

            if printf '%s\n' "$changed_files" | grep -Eq '^(application/|zygisk/|rust/|module_template/|prebuilt/|module\.prop$)'; then
              paths_changed=true
              reason="Tracked build paths changed"
            fi
          fi

          {
            echo "### Check tracked changes"
            echo
            echo "Paths changed: \`$paths_changed\`"
            echo "Reason: $reason"
            echo
            echo "Tracked paths:"
            echo "- application/**"
            echo "- zygisk/**"
            echo "- rust/**"
            echo "- module_template/**"
            echo "- prebuilt/**"
            echo "- module.prop"
            if [[ -n "$changed_files" ]]; then
              echo
              echo "Changed files:"
              printf '%s\n' "$changed_files" | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          echo "paths_changed=$paths_changed" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

  check_force_phrase:
    name: Check manual compile phrase
    runs-on: ubuntu-latest
    outputs:
      force_compile: ${{ steps.detect.outputs.force_compile }}
      reason: ${{ steps.detect.outputs.reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect force phrase
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          FORCE_PHRASE: auto run compile
        run: |
          set -euo pipefail

          force_compile=false
          reason="Force phrase not found"
          commit_messages=""

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            reason="Manual workflow_dispatch run; force phrase check is bypassed by build gate"
          else
            base="$BEFORE_SHA"
            head="$HEAD_SHA"

            if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              if git rev-parse "${head}^" >/dev/null 2>&1; then
                base="$(git rev-parse "${head}^")"
              else
                base=""
              fi
            fi

            if [[ -n "$base" ]]; then
              commit_messages="$(git log --format=%B "${base}..${head}" || true)"
            else
              commit_messages="$(git log -1 --format=%B "$head" || true)"
            fi

            if printf '%s\n' "$commit_messages" | grep -qiF "$FORCE_PHRASE"; then
              force_compile=true
              reason="Commit message contains '$FORCE_PHRASE'"
            fi
          fi

          {
            echo "### Check manual compile phrase"
            echo
            echo "Force compile: \`$force_compile\`"
            echo "Reason: $reason"
            echo
            echo "Force phrase: \`$FORCE_PHRASE\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "force_compile=$force_compile" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

  build_gate:
    name: ZDT-D build gate
    runs-on: ubuntu-latest
    needs:
      - check_paths
      - check_force_phrase
    outputs:
      should_build: ${{ steps.gate.outputs.should_build }}
      reason: ${{ steps.gate.outputs.reason }}
      build_start_ts: ${{ steps.gate.outputs.build_start_ts }}

    steps:
      - name: Decide whether to compile
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          PATHS_CHANGED: ${{ needs.check_paths.outputs.paths_changed }}
          FORCE_COMPILE: ${{ needs.check_force_phrase.outputs.force_compile }}
          PATH_REASON: ${{ needs.check_paths.outputs.reason }}
          FORCE_REASON: ${{ needs.check_force_phrase.outputs.reason }}
        run: |
          set -euo pipefail

          should_build=false
          reason="No build-related changes detected"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            should_build=true
            reason="Manual workflow_dispatch run"
          elif [[ "$FORCE_COMPILE" == "true" ]]; then
            should_build=true
            reason="$FORCE_REASON"
          elif [[ "$PATHS_CHANGED" == "true" ]]; then
            should_build=true
            reason="$PATH_REASON"
          fi

          build_start_ts="$(date +%s)"

          {
            echo "### ZDT-D build gate"
            echo
            echo "Should build: \`$should_build\`"
            echo "Reason: $reason"
            echo
            echo "Inputs:"
            echo "- Tracked paths changed: \`$PATHS_CHANGED\`"
            echo "- Force phrase matched: \`$FORCE_COMPILE\`"
            echo "- Event: \`$EVENT_NAME\`"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"
          echo "build_start_ts=$build_start_ts" >> "$GITHUB_OUTPUT"

          echo "should_build=$should_build"
          echo "reason=$reason"

  build_rust_binaries:
    name: Build Rust binaries
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK cross-linker
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          NDK_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
          ANDROID_CC="$NDK_BIN/aarch64-linux-android21-clang"
          ANDROID_CXX="$NDK_BIN/aarch64-linux-android21-clang++"
          ANDROID_AR="$NDK_BIN/llvm-ar"
          ANDROID_RANLIB="$NDK_BIN/llvm-ranlib"

          test -x "$ANDROID_CC" || { echo "::error::Android C compiler not found: $ANDROID_CC"; exit 1; }
          test -x "$ANDROID_CXX" || { echo "::error::Android C++ compiler not found: $ANDROID_CXX"; exit 1; }
          test -x "$ANDROID_AR" || { echo "::error::Android archiver not found: $ANDROID_AR"; exit 1; }
          test -x "$ANDROID_RANLIB" || { echo "::error::Android ranlib not found: $ANDROID_RANLIB"; exit 1; }

          {
            echo "NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_ROOT=$NDK_ROOT"
            echo "ANDROID_NDK_HOME=$NDK_ROOT"
            echo "PATH=$NDK_BIN:$PATH"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_CC"
            echo "CC_aarch64_linux_android=$ANDROID_CC"
            echo "CXX_aarch64_linux_android=$ANDROID_CXX"
            echo "AR_aarch64_linux_android=$ANDROID_AR"
            echo "RANLIB_aarch64_linux_android=$ANDROID_RANLIB"
          } >> "$GITHUB_ENV"

          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<EOF2
          [target.aarch64-linux-android]
          linker = "$ANDROID_CC"
          ar = "$ANDROID_AR"
          EOF2

      - name: Cache Cargo registry and Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-rust-binaries-aarch64-linux-android-${{ hashFiles('rust/**/Cargo.lock') }}
          restore-keys: |
            cargo-rust-binaries-aarch64-linux-android-
            cargo-aarch64-linux-android-

      - name: Verify Android Rust cross toolchain
        run: |
          set -euo pipefail
          echo "NDK_ROOT=$NDK_ROOT"
          "$CC_aarch64_linux_android" --version | head -1
          "$AR_aarch64_linux_android" --version | head -1
          rustc --print target-list | grep -qx '${{ env.CARGO_BUILD_TARGET }}'
          cargo -V
          rustc -V

      - name: Build all Rust binaries
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/rust/target
          RUSTUP_HOME: ""
          RUSTUP_TOOLCHAIN: ""
          RUSTFLAGS: ""
          CARGO_ENCODED_RUSTFLAGS: ""
          RUSTC_WRAPPER: ""
        run: |
          set -euo pipefail
          cargo build --manifest-path rust/zdtd/Cargo.toml --profile "${{ env.CARGO_PROFILE }}" --target "${{ env.CARGO_BUILD_TARGET }}"
          cargo build --manifest-path rust/T2s/Cargo.toml --profile "${{ env.CARGO_PROFILE }}" --target "${{ env.CARGO_BUILD_TARGET }}"
          cargo build --manifest-path rust/dpi-detector/Cargo.toml --profile "${{ env.CARGO_PROFILE }}" --target "${{ env.CARGO_BUILD_TARGET }}"
          cargo build --manifest-path rust/nfqws-tester/Cargo.toml --profile "${{ env.CARGO_PROFILE }}" --target "${{ env.CARGO_BUILD_TARGET }}"

      - name: Collect Rust binaries
        run: |
          set -euo pipefail
          SRC="rust/target/${{ env.CARGO_BUILD_TARGET }}/${{ env.CARGO_PROFILE }}"
          DST="out/artifacts/rust"
          mkdir -p "$DST"
          cp -f "$SRC/zdtd" "$DST/zdtd"
          cp -f "$SRC/t2s" "$DST/t2s"
          cp -f "$SRC/dpi-detector" "$DST/dpi-detector"
          cp -f "$SRC/nfqws-tester" "$DST/nfqws-tester"
          chmod 755 "$DST/zdtd" "$DST/t2s" "$DST/dpi-detector" "$DST/nfqws-tester"
          ls -lh "$DST"

      - name: Upload Rust binaries
        uses: actions/upload-artifact@v7
        with:
          name: zdt-rust-binaries
          path: out/artifacts/rust/
          retention-days: 1

  build_zygisk:
    name: Compile Zygisk module
    runs-on: ubuntu-latest
    needs: build_gate
    if: needs.build_gate.outputs.should_build == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          set -euo pipefail
          NDK_VERSION="27.2.12479018"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "ndk;$NDK_VERSION"
          NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          if [[ ! -d "$NDK_ROOT" ]]; then
            echo "::warning::Expected NDK not found at $NDK_ROOT, falling back to latest installed NDK"
            NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$(ls "$ANDROID_SDK_ROOT/ndk" | sort -V | tail -1)"
          fi
          echo "NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_ROOT" >> "$GITHUB_ENV"

      - name: Build Zygisk arm64-v8a
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_ROOT: ${{ env.NDK_ROOT }}
          NDK_ROOT: ${{ env.NDK_ROOT }}
          ANDROID_API_LEVEL: 24
        run: |
          set -euo pipefail
          mkdir -p out/zygisk
          ./zygisk/build.sh out/zygisk/arm64-v8a.so
          file out/zygisk/arm64-v8a.so
          test -s out/zygisk/arm64-v8a.so
          readelf -Ws out/zygisk/arm64-v8a.so | grep -q ' zygisk_module_entry$'
          if readelf -d out/zygisk/arm64-v8a.so | grep -E 'NEEDED.*(libc\+\+|libstdc\+\+)' >/dev/null 2>&1; then
            echo "::error::Zygisk binary must not depend on C++ STL runtime"
            exit 1
          fi

      - name: Upload Zygisk binary
        uses: actions/upload-artifact@v7
        with:
          name: zygisk-arm64
          path: out/zygisk/arm64-v8a.so
          retention-days: 1

  pack_module:
    name: Pack ZDT-D module
    runs-on: ubuntu-latest
    needs:
      - build_rust_binaries
      - build_zygisk
    if: needs.build_rust_binaries.result == 'success' && needs.build_zygisk.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Rust binaries
        uses: actions/download-artifact@v7
        with:
          name: zdt-rust-binaries
          path: out/artifacts/rust

      - name: Download Zygisk binary
        uses: actions/download-artifact@v7
        with:
          name: zygisk-arm64
          path: out/zygisk

      - name: Check prebuilt binaries
        run: |
          REQUIRED=(byedpi dnscrypt dpitunnel-cli nfqws nfqws2 opera-proxy sing-box mieru wireproxy torproxy lyrebird tun2socks openvpn mihomo amneziawg-go awg)
          MISSING=()
          for bin in "${REQUIRED[@]}"; do
            [[ -f "prebuilt/bin/arm64-v8a/$bin" ]] || MISSING+=("$bin")
          done
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::Binaries doesn't exist: ${MISSING[*]}"
            exit 1
          fi
          echo "All binaries found"

      - name: Pack Magisk module archive
        run: |
          set -euo pipefail

          MODULE_BUILD_DIR="out/module_build/module_root"
          MODULE_ZIP="out/module/zdt_module.zip"
          PREBUILT="prebuilt/bin/arm64-v8a"
          ZDTD_BIN="out/artifacts/rust/zdtd"
          T2S_BIN="out/artifacts/rust/t2s"
          ZYGISK_SO="out/zygisk/arm64-v8a.so"

          test -s "$ZDTD_BIN" || { echo "::error::zdtd artifact missing: $ZDTD_BIN"; exit 1; }
          test -s "$T2S_BIN" || { echo "::error::t2s artifact missing: $T2S_BIN"; exit 1; }
          test -s "$ZYGISK_SO" || { echo "::error::Zygisk artifact missing: $ZYGISK_SO"; exit 1; }

          rm -rf out/module_build
          mkdir -p "$MODULE_BUILD_DIR" out/module

          cp -a module_template/. "$MODULE_BUILD_DIR/"
          cp -f module.prop "$MODULE_BUILD_DIR/module.prop"

          [[ -d "$MODULE_BUILD_DIR/META-INF" ]] || { echo "::error::META-INF doesnt exist in module_template"; exit 1; }
          find "$MODULE_BUILD_DIR" -name .gitkeep -type f -delete 2>/dev/null || true
          rm -f "$MODULE_BUILD_DIR/zygisk/unloaded" 2>/dev/null || true

          mkdir -p "$MODULE_BUILD_DIR/bin" "$MODULE_BUILD_DIR/zygisk"
          cp -f "$ZYGISK_SO" "$MODULE_BUILD_DIR/zygisk/arm64-v8a.so" && chmod 644 "$MODULE_BUILD_DIR/zygisk/arm64-v8a.so"

          cp -f "$ZDTD_BIN" "$MODULE_BUILD_DIR/bin/zdtd" && chmod 755 "$MODULE_BUILD_DIR/bin/zdtd"
          cp -f "$T2S_BIN"  "$MODULE_BUILD_DIR/bin/t2s"  && chmod 755 "$MODULE_BUILD_DIR/bin/t2s"
          for bin in byedpi dnscrypt dpitunnel-cli nfqws nfqws2 opera-proxy sing-box mieru wireproxy torproxy lyrebird tun2socks openvpn mihomo amneziawg-go awg; do
            cp -f "$PREBUILT/$bin" "$MODULE_BUILD_DIR/bin/$bin" && chmod 755 "$MODULE_BUILD_DIR/bin/$bin"
          done

          pushd "$MODULE_BUILD_DIR" > /dev/null
          zip -qr "../../../$MODULE_ZIP" .
          popd > /dev/null

          ZIP_ENTRIES="$(unzip -Z1 "$MODULE_ZIP" 2>/dev/null)" || { echo "::error::Unable to read module zip"; exit 1; }
          printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'zygisk/arm64-v8a.so' >/dev/null || { echo "::error::Zygisk binary missing in module zip"; exit 1; }
          if printf '%s\n' "$ZIP_ENTRIES" | grep -Fx 'bin/dpi-detector' >/dev/null; then
            echo "::error::dpi-detector must not be packed into module zip; it belongs to APK assets"
            exit 1
          fi
          if printf '%s\n' "$ZIP_ENTRIES" | grep -E '(^|/)(unloaded|\.gitkeep)$' >/dev/null; then
            echo "::error::unloaded or .gitkeep leaked into module zip"
            exit 1
          fi

          ls -lh "$MODULE_ZIP"

      - name: Upload module archive
        uses: actions/upload-artifact@v7
        with:
          name: zdt-module-zip
          path: out/module/zdt_module.zip
          retention-days: 1

  build_apk:
    name: Build Android application
    runs-on: ubuntu-latest
    needs:
      - pack_module
      - build_rust_binaries
    if: needs.pack_module.result == 'success' && needs.build_rust_binaries.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-${{ env.ANDROID_API_LEVEL }}" \
            "build-tools;${{ env.ANDROID_BUILD_TOOLS_VERSION }}"

      - name: Setup Gradle ${{ env.GRADLE_VERSION }}
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Download module archive
        uses: actions/download-artifact@v7
        with:
          name: zdt-module-zip
          path: out/module

      - name: Download Rust binaries
        uses: actions/download-artifact@v7
        with:
          name: zdt-rust-binaries
          path: out/artifacts/rust

      - name: Locate Android project root
        run: |
          SETTINGS=$(find . -maxdepth 4 \( -name 'settings.gradle' -o -name 'settings.gradle.kts' \) \
            | grep -v '/build/' | sort | head -1)
          if [[ -z "$SETTINGS" ]]; then
            echo "::error::settings.gradle dont found:"
            find . -maxdepth 4 -name '*.gradle*' | sort
            exit 1
          fi
          GRADLE_PROJECT_DIR=$(dirname "$SETTINGS")
          echo "GRADLE_PROJECT_DIR=$GRADLE_PROJECT_DIR" >> $GITHUB_ENV
          echo "Android project root: $GRADLE_PROJECT_DIR"
          test -s out/module/zdt_module.zip || { echo "::error::Downloaded module zip is missing"; exit 1; }

      - name: Write local.properties & restore signing keystore
        env:
          ZDT_KEYSTORE_BASE64: ${{ secrets.ZDT_KEYSTORE_BASE64 }}
          ZDT_KEYSTORE_PASSWORD: ${{ secrets.ZDT_KEYSTORE_PASSWORD }}
          ZDT_KEY_ALIAS: ${{ secrets.ZDT_KEY_ALIAS }}
          ZDT_KEY_PASSWORD: ${{ secrets.ZDT_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$GRADLE_PROJECT_DIR/local.properties"

          for name in ZDT_KEYSTORE_BASE64 ZDT_KEYSTORE_PASSWORD ZDT_KEY_ALIAS ZDT_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::$name GitHub Actions secret is missing or empty"
              exit 1
            fi
          done

          KEYSTORE_PATH="$(pwd)/keystores/zdt-debug.keystore"
          mkdir -p "$(dirname "$KEYSTORE_PATH")"

          printf '%s' "$ZDT_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "$ZDT_KEYSTORE_PASSWORD" \
            -alias "$ZDT_KEY_ALIAS" \
            >/dev/null

          {
            echo "storeFile=$KEYSTORE_PATH"
            echo "storePassword=$ZDT_KEYSTORE_PASSWORD"
            echo "keyAlias=$ZDT_KEY_ALIAS"
            echo "keyPassword=$ZDT_KEY_PASSWORD"
          } > "$GRADLE_PROJECT_DIR/keystore.properties"

      - name: Prepare dpi-detector APK asset
        run: |
          set -euo pipefail
          SRC="out/artifacts/rust/dpi-detector"
          DST="application/app/build/generated/zdt-assets/main/dpi-detector/arm64-v8a/dpi-detector"
          test -s "$SRC" || { echo "::error::dpi-detector artifact missing: $SRC"; exit 1; }
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          chmod 755 "$DST"
          ls -lh "$DST"

      - name: Prepare nfqws_tester APK asset
        run: |
          set -euo pipefail
          SRC="out/artifacts/rust/nfqws-tester"
          DST="application/app/build/generated/zdt-assets/main/nfqws-tester/arm64-v8a/nfqws_tester"
          test -s "$SRC" || { echo "::error::nfqws_tester artifact missing: $SRC"; exit 1; }
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          chmod 755 "$DST"
          ls -lh "$DST"

      - name: Build APK assemble${{ env.BUILD_TYPE }}
        working-directory: ${{ env.GRADLE_PROJECT_DIR }}
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: |
          gradle \
            --no-daemon \
            --max-workers=$(nproc) \
            "-PzdtCompileSdk=${{ env.ZDT_COMPILE_SDK }}" \
            "assemble${{ env.BUILD_TYPE }}"

      - name: Collect final artifacts
        run: |
          set -euo pipefail
          mkdir -p out/dist

          APK=$(find "$GRADLE_PROJECT_DIR" -path '*/build/outputs/apk/*.apk' -type f | sort | tail -1)
          [[ -n "$APK" ]] || { echo "::error::APK does not exist"; exit 1; }

          APK_ENTRIES="$(unzip -Z1 "$APK" 2>/dev/null)" || { echo "::error::Unable to read APK: $APK"; exit 1; }
          if ! printf '%s\n' "$APK_ENTRIES" | grep -Fx 'AndroidManifest.xml' >/dev/null; then
            echo "::error::Gradle output is not an installable APK or AndroidManifest.xml is missing: $APK"
            printf '%s\n' "$APK_ENTRIES" | head -80 || true
            exit 1
          fi
          printf '%s\n' "$APK_ENTRIES" | grep -Fx 'assets/dpi-detector/arm64-v8a/dpi-detector' >/dev/null || { echo "::error::dpi-detector APK asset missing"; exit 1; }
          printf '%s\n' "$APK_ENTRIES" | grep -Fx 'assets/nfqws-tester/arm64-v8a/nfqws_tester' >/dev/null || { echo "::error::nfqws_tester APK asset missing"; exit 1; }

          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/${{ env.ANDROID_BUILD_TOOLS_VERSION }}/apksigner"
          [[ -x "$APKSIGNER" ]] || { echo "::error::apksigner not found: $APKSIGNER"; exit 1; }
          "$APKSIGNER" verify --verbose "$APK"

          cp -f "$APK" out/dist/app-release.apk
          cp -f out/module/zdt_module.zip out/dist/zdt_module.zip

          ls -lh out/dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: zdt-apk
          path: out/dist/app-release.apk
          retention-days: 30

      - name: Upload module artifact
        uses: actions/upload-artifact@v7
        with:
          name: zdt-module-final
          path: out/dist/zdt_module.zip
          retention-days: 30

  publish_service:
    name: Publish service build
    runs-on: ubuntu-latest
    needs:
      - build_gate
      - build_apk
    # Disabled: personal fork — no automatic releases
    if: false && github.ref == 'refs/heads/main' && needs.build_apk.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v7
        with:
          name: zdt-apk
          path: out/dist

      - name: Publish service and stable releases
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_START_TS: ${{ needs.build_gate.outputs.build_start_ts }}
        run: |
          set -euo pipefail

          SERVICE_TAG="service-build"
          SERVICE_TITLE="ZDT-D Service Build"
          APK_SOURCE="out/dist/app-release.apk"
          SERVICE_APK="out/dist/ZDT-D-service-build.apk"
          STABLE_ASSET_SPEC="${APK_SOURCE}#app-release.apk"

          test -s "$APK_SOURCE" || { echo "::error::APK does not exist: $APK_SOURCE"; exit 1; }
          cp -f "$APK_SOURCE" "$SERVICE_APK"

          VERSION_CODE="$(grep -m1 '^versionCode=' module.prop | cut -d'=' -f2 | tr -d '[:space:]')"
          VERSION_NAME="$(grep -m1 '^version=' module.prop | cut -d'=' -f2 | tr -d '[:space:]')"

          if [[ -z "$VERSION_CODE" || ! "$VERSION_CODE" =~ ^[0-9]+$ ]]; then
            echo "::error::Numeric versionCode not found in module.prop"
            exit 1
          fi
          if [[ -z "$VERSION_NAME" ]]; then
            echo "::error::version not found in module.prop"
            exit 1
          fi

          BUILD_END_TS="$(date +%s)"
          BUILD_START_TS="${BUILD_START_TS:-$BUILD_END_TS}"
          BUILD_DURATION_SEC=$((BUILD_END_TS - BUILD_START_TS))
          BUILD_DURATION="$(printf '%02d:%02d:%02d' $((BUILD_DURATION_SEC / 3600)) $(((BUILD_DURATION_SEC % 3600) / 60)) $((BUILD_DURATION_SEC % 60)))"
          BUILD_TIME_UTC="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          APK_SIZE_BYTES="$(stat -c%s "$APK_SOURCE")"
          APK_SIZE_HUMAN="$(numfmt --to=iec --suffix=B --format='%.2f' "$APK_SIZE_BYTES")"

          FULL_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          REPO_URL="https://github.com/${{ github.repository }}"
          RUN_URL="${REPO_URL}/actions/runs/${{ github.run_id }}"
          BUILD_TYPE="${{ env.BUILD_TYPE }}"
          BRANCH_NAME="${GITHUB_REF_NAME:-main}"

          git fetch --tags --force >/dev/null 2>&1 || true

          parse_version_code_from_body() {
            sed -nE 's/^\|[[:space:]]*(Version code|Код версии)[[:space:]]*\|[[:space:]]*`?([0-9]+)`?[[:space:]]*\|[[:space:]]*$/\2/p' | head -1
          }

          make_commit_list() {
            local from_sha="$1"
            local to_sha="$2"
            local max_items="${3:-50}"
            local total="0"
            local list=""

            if [[ -n "$from_sha" && "$from_sha" != "$to_sha" ]]; then
              local range="${from_sha}..${to_sha}"
              total="$(git rev-list --count "$range" 2>/dev/null || echo 0)"
              if [[ "$max_items" =~ ^[0-9]+$ && "$max_items" -gt 0 ]]; then
                list="$(git log --no-merges --pretty=format:'- %s (`%h`)' -n "$max_items" "$range" 2>/dev/null || true)"
              else
                list="$(git log --no-merges --pretty=format:'- %s (`%h`)' "$range" 2>/dev/null || true)"
              fi
            else
              total="0"
              list="- No changes after the latest stable release."
            fi

            if [[ -z "$list" ]]; then
              list="- No commit messages found."
            fi
            if [[ "$max_items" =~ ^[0-9]+$ && "$max_items" -gt 0 && "$total" =~ ^[0-9]+$ && "$total" -gt "$max_items" ]]; then
              list="${list}"$'\n'"- ...and $((total - max_items)) more commits."
            fi
            printf '%s\n' "$list"
          }

          compare_url_for_range() {
            local from_sha="$1"
            local to_sha="$2"
            if [[ -n "$from_sha" && "$from_sha" != "$to_sha" ]]; then
              printf '%s/compare/%s...%s\n' "$REPO_URL" "$from_sha" "$to_sha"
            else
              printf '%s/commit/%s\n' "$REPO_URL" "$to_sha"
            fi
          }

          latest_stable_tag() {
            git tag -l 'V[0-9]*.[0-9]*.0' | sed 's/^V//' | sort -V | tail -n1 | sed 's/^/V/' || true
          }

          generate_service_ai_summary() {
            local commit_file="$1"
            local output_file="$2"
            local latest_tag="$3"

            if [[ ! -s "$commit_file" ]]; then
              printf '%s\n' "AI summary is unavailable: commit list is empty." > "$output_file"
              return 0
            fi

            cat > service_ai_prompt.txt <<EOF_AI_PROMPT
          You are preparing a short release comment for the ZDT-D Android project.
          Write in English.
          Be concise: 3-6 bullet points maximum.
          Summarize the practical changes since the baseline release.
          Do not invent features. Use only the commit list below.
          Mention the baseline release: ${latest_tag:-none}.
          
          Version: ${VERSION_NAME}
          Version code: ${VERSION_CODE}
          Commit: ${SHORT_SHA}
          
          Commit list:
          $(cat "$commit_file")
          EOF_AI_PROMPT

            python3 - <<'PY_AI_PAYLOAD' > service_ai_payload.json
          import json
          import os
          from pathlib import Path
          prompt = Path('service_ai_prompt.txt').read_text(encoding='utf-8')
          payload = {
              "model": os.environ.get("GITHUB_MODELS_MODEL", "openai/gpt-4o"),
              "messages": [
                  {"role": "system", "content": "You write concise release summaries for Android/Rust networking tools."},
                  {"role": "user", "content": prompt},
              ],
              "temperature": 0.2,
              "max_tokens": 450,
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY_AI_PAYLOAD

            if curl -fsS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d @service_ai_payload.json \
              https://models.github.ai/inference/chat/completions > service_ai_response.json; then
              python3 - <<'PY_AI_RESPONSE' > "$output_file" || true
          import json
          from pathlib import Path
          try:
              data = json.loads(Path('service_ai_response.json').read_text(encoding='utf-8'))
              text = data.get('choices', [{}])[0].get('message', {}).get('content', '').strip()
              print(text or 'AI summary is unavailable: empty response.')
          except Exception as exc:
              print(f'AI summary is unavailable: {exc}')
          PY_AI_RESPONSE
            else
              printf '%s\n' "AI summary is unavailable for this run. See the workflow summary for technical details." > "$output_file"
            fi
          }

          upload_asset_with_retry() {
            local tag="$1"
            local file_spec="$2"
            local asset_name="$3"
            local attempt=1
            local max_attempts=5
            UPLOAD_MODE="clobber"
            UPLOAD_ATTEMPTS="0"

            while [[ "$attempt" -le "$max_attempts" ]]; do
              echo "Upload $asset_name to $tag with --clobber: attempt $attempt/$max_attempts"
              if gh release upload "$tag" "$file_spec" --clobber; then
                UPLOAD_MODE="clobber"
                UPLOAD_ATTEMPTS="$attempt"
                return 0
              fi
              if [[ "$attempt" -lt "$max_attempts" ]]; then
                sleep $((attempt * 5))
              fi
              attempt=$((attempt + 1))
            done

            echo "::warning::Upload with --clobber failed for $asset_name on $tag. Trying delete+upload fallback."
            local asset_id=""
            asset_id="$(gh release view "$tag" --json assets --jq ".assets[] | select(.name==\"${asset_name}\") | .id" | head -n1 || true)"
            if [[ -n "$asset_id" ]]; then
              gh api -X DELETE "repos/${{ github.repository }}/releases/assets/$asset_id"
              sleep 3
            fi

            attempt=1
            while [[ "$attempt" -le "$max_attempts" ]]; do
              echo "Fallback upload $asset_name to $tag: attempt $attempt/$max_attempts"
              if gh release upload "$tag" "$file_spec"; then
                UPLOAD_MODE="delete+upload"
                UPLOAD_ATTEMPTS="$attempt"
                return 0
              fi
              if [[ "$attempt" -lt "$max_attempts" ]]; then
                sleep $((attempt * 5))
              fi
              attempt=$((attempt + 1))
            done

            echo "::error::Failed to upload $asset_name to $tag after retries and fallback"
            return 1
          }

          version_code_matches_version=false
          stable_version_shape=false
          code_min=""
          code_max=""
          if [[ "$VERSION_NAME" =~ ^([0-9]+)\.([0-9]+)\.0$ ]]; then
            stable_version_shape=true
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            code_prefix="${major}${minor}"
            code_min=$((code_prefix * 1000))
            code_max=$((code_min + 999))
            if (( VERSION_CODE >= code_min && VERSION_CODE <= code_max )); then
              version_code_matches_version=true
            fi
          fi

          SERVICE_RELEASE_EXISTS=false
          if gh release view "$SERVICE_TAG" >/dev/null 2>&1; then
            SERVICE_RELEASE_EXISTS=true
          fi

          LATEST_STABLE_TAG="$(latest_stable_tag)"
          LATEST_STABLE_SHA=""
          if [[ -n "$LATEST_STABLE_TAG" ]] && git rev-parse -q --verify "refs/tags/${LATEST_STABLE_TAG}" >/dev/null 2>&1; then
            LATEST_STABLE_SHA="$(git rev-list -n 1 "$LATEST_STABLE_TAG" 2>/dev/null || true)"
          fi

          SERVICE_COMPARE_URL="$(compare_url_for_range "$LATEST_STABLE_SHA" "$FULL_SHA")"
          SERVICE_COMMIT_LIST="$(make_commit_list "$LATEST_STABLE_SHA" "$FULL_SHA" 0)"
          printf '%s\n' "$SERVICE_COMMIT_LIST" > service_commit_list.txt
          generate_service_ai_summary service_commit_list.txt service_ai_summary.md "$LATEST_STABLE_TAG"
          SERVICE_AI_SUMMARY="$(cat service_ai_summary.md)"

          cat > service_release_notes.md <<EOF_SERVICE_NOTES
          # ZDT-D Service Build

          This is an automatic service build of ZDT-D.

          The service build is updated after every successful workflow run and always contains the APK from the latest successful build.

          > This release is a technical prerelease and is not considered a stable version release.

          ## AI summary

          ${SERVICE_AI_SUMMARY}

          ## Build information

          | Field | Value |
          |---|---|
          | Version | \`${VERSION_NAME}\` |
          | Version code | \`${VERSION_CODE}\` |
          | Latest stable release | \`${LATEST_STABLE_TAG:-none}\` |
          | Commit | [\`${SHORT_SHA}\`](${REPO_URL}/commit/${FULL_SHA}) |
          | Branch | \`${BRANCH_NAME}\` |
          | Workflow run | [#${{ github.run_number }}](${RUN_URL}) |
          | Build date | \`${BUILD_TIME_UTC}\` |
          | Build type | \`${BUILD_TYPE}\` |
          | APK size | \`${APK_SIZE_HUMAN}\` |
          | Build duration | \`${BUILD_DURATION}\` |
          EOF_SERVICE_NOTES

          echo "===== Service release notes ====="
          cat service_release_notes.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$SERVICE_TAG" "$FULL_SHA"
          git push -f origin "refs/tags/${SERVICE_TAG}"

          if [[ "$SERVICE_RELEASE_EXISTS" == "true" ]]; then
            gh release edit "$SERVICE_TAG" --title "$SERVICE_TITLE" --notes-file service_release_notes.md --prerelease
          else
            gh release create "$SERVICE_TAG" --target "$FULL_SHA" --title "$SERVICE_TITLE" --notes-file service_release_notes.md --prerelease --latest=false
          fi
          upload_asset_with_retry "$SERVICE_TAG" "$SERVICE_APK" "ZDT-D-service-build.apk"
          SERVICE_UPLOAD_MODE="$UPLOAD_MODE"
          SERVICE_UPLOAD_ATTEMPTS="$UPLOAD_ATTEMPTS"

          STABLE_ACTION="skipped"
          STABLE_REASON=""
          STABLE_TAG="V${VERSION_NAME}"
          STABLE_TITLE="V ${VERSION_NAME}"
          STABLE_UPLOAD_MODE=""
          STABLE_UPLOAD_ATTEMPTS=""
          STABLE_RELEASE_EXISTS=false
          STABLE_PUBLISHED_VERSION_CODE=""

          if [[ "$stable_version_shape" != "true" ]]; then
            STABLE_REASON="version '${VERSION_NAME}' is not a stable X.Y.0 version"
          elif [[ "$version_code_matches_version" != "true" ]]; then
            STABLE_REASON="versionCode ${VERSION_CODE} is outside expected range ${code_min}..${code_max} for version ${VERSION_NAME}"
            echo "::warning::$STABLE_REASON. Stable release will not be created or updated."
          elif gh release view "$STABLE_TAG" >/dev/null 2>&1; then
            STABLE_RELEASE_EXISTS=true
            STABLE_BODY="$(gh release view "$STABLE_TAG" --json body --jq '.body // ""')"
            STABLE_PUBLISHED_VERSION_CODE="$(printf '%s\n' "$STABLE_BODY" | parse_version_code_from_body)"
            STABLE_ASSET_EXISTS=false
            if gh release view "$STABLE_TAG" --json assets --jq '.assets[].name' | grep -Fx 'app-release.apk' >/dev/null 2>&1; then
              STABLE_ASSET_EXISTS=true
            fi

            if [[ -n "$STABLE_PUBLISHED_VERSION_CODE" && "$STABLE_PUBLISHED_VERSION_CODE" =~ ^[0-9]+$ ]]; then
              if (( VERSION_CODE > STABLE_PUBLISHED_VERSION_CODE )); then
                upload_asset_with_retry "$STABLE_TAG" "$STABLE_ASSET_SPEC" "app-release.apk"
                STABLE_UPLOAD_MODE="$UPLOAD_MODE"
                STABLE_UPLOAD_ATTEMPTS="$UPLOAD_ATTEMPTS"
                STABLE_ACTION="asset-updated"
                STABLE_REASON="versionCode increased for existing ${STABLE_TAG}: ${STABLE_PUBLISHED_VERSION_CODE} -> ${VERSION_CODE}"
              elif (( VERSION_CODE == STABLE_PUBLISHED_VERSION_CODE )) && [[ "$STABLE_ASSET_EXISTS" != "true" ]]; then
                upload_asset_with_retry "$STABLE_TAG" "$STABLE_ASSET_SPEC" "app-release.apk"
                STABLE_UPLOAD_MODE="$UPLOAD_MODE"
                STABLE_UPLOAD_ATTEMPTS="$UPLOAD_ATTEMPTS"
                STABLE_ACTION="asset-restored"
                STABLE_REASON="app-release.apk was missing in existing ${STABLE_TAG}; restored asset for versionCode ${VERSION_CODE}"
              else
                STABLE_ACTION="skipped"
                STABLE_REASON="stable release preserved because current versionCode ${VERSION_CODE} is not greater than published ${STABLE_PUBLISHED_VERSION_CODE}"
              fi
            else
              STABLE_ACTION="skipped"
              STABLE_REASON="existing ${STABLE_TAG} release body does not contain a parseable version code"
              echo "::warning::$STABLE_REASON. Stable asset sync skipped to avoid unsafe overwrite."
            fi
          else
            PREVIOUS_STABLE_TAG=""
            while IFS= read -r version; do
              [[ -z "$version" ]] && continue
              if [[ "$(printf '%s\n%s\n' "$version" "$VERSION_NAME" | sort -V | head -n1)" == "$version" && "$version" != "$VERSION_NAME" ]]; then
                PREVIOUS_STABLE_TAG="V${version}"
              fi
            done < <(git tag -l 'V[0-9]*.[0-9]*.0' | sed 's/^V//' | sort -V)

            PREVIOUS_STABLE_SHA=""
            if [[ -n "$PREVIOUS_STABLE_TAG" ]] && git rev-parse -q --verify "refs/tags/${PREVIOUS_STABLE_TAG}" >/dev/null 2>&1; then
              PREVIOUS_STABLE_SHA="$(git rev-list -n 1 "$PREVIOUS_STABLE_TAG" 2>/dev/null || true)"
            fi

            STABLE_COMPARE_URL="$(compare_url_for_range "$PREVIOUS_STABLE_SHA" "$FULL_SHA")"
            STABLE_COMMIT_LIST="$(make_commit_list "$PREVIOUS_STABLE_SHA" "$FULL_SHA" 0)"
            printf '%s\n' "$STABLE_COMMIT_LIST" > stable_commit_list.txt
            generate_service_ai_summary stable_commit_list.txt stable_ai_summary.md "$PREVIOUS_STABLE_TAG"
            STABLE_SUMMARY="$(cat stable_ai_summary.md)"

            cat > stable_release_notes.md <<EOF_STABLE_NOTES
          # ZDT-D V${VERSION_NAME}

          ## Highlights

          ${STABLE_SUMMARY}

          ## Release information

          | Field | Value |
          |---|---|
          | Version | \`${VERSION_NAME}\` |
          | Version code | \`${VERSION_CODE}\` |
          | Tag | \`${STABLE_TAG}\` |
          | Commit | [\`${SHORT_SHA}\`](${REPO_URL}/commit/${FULL_SHA}) |
          | Workflow run | [#${{ github.run_number }}](${RUN_URL}) |
          | Build date | \`${BUILD_TIME_UTC}\` |
          EOF_STABLE_NOTES

            echo "===== Stable release notes ====="
            cat stable_release_notes.md

            gh release create "$STABLE_TAG" \
              --target "$FULL_SHA" \
              --title "$STABLE_TITLE" \
              --notes-file stable_release_notes.md \
              --latest

            upload_asset_with_retry "$STABLE_TAG" "$STABLE_ASSET_SPEC" "app-release.apk"
            STABLE_UPLOAD_MODE="$UPLOAD_MODE"
            STABLE_UPLOAD_ATTEMPTS="$UPLOAD_ATTEMPTS"
            STABLE_ACTION="created"
            STABLE_REASON="created new stable release ${STABLE_TAG}"
          fi

          {
            echo "### Service build publish"
            echo
            echo "Service release: \`$SERVICE_TAG\`"
            echo "Service post updated: \`true\`"
            echo "Service APK asset updated: \`ZDT-D-service-build.apk\`"
            echo "Service upload mode: \`${SERVICE_UPLOAD_MODE}\`"
            echo "Service upload attempts: \`${SERVICE_UPLOAD_ATTEMPTS}\`"
            echo "Service changelog baseline: \`${LATEST_STABLE_TAG:-none}\`"
            echo "Service compare: ${SERVICE_COMPARE_URL}"
            echo "GitHub Models AI summary: \`attempted\`"
            echo
            echo "### Stable release decision"
            echo
            echo "Version: \`${VERSION_NAME}\`"
            echo "Version code: \`${VERSION_CODE}\`"
            if [[ -n "$code_min" && -n "$code_max" ]]; then
              echo "Expected versionCode range: \`${code_min}..${code_max}\`"
            else
              echo "Expected versionCode range: \`not applicable\`"
            fi
            echo "Version shape X.Y.0: \`${stable_version_shape}\`"
            echo "versionCode matches version: \`${version_code_matches_version}\`"
            echo "Stable tag: \`${STABLE_TAG}\`"
            echo "Stable release action: \`${STABLE_ACTION}\`"
            echo "Reason: $STABLE_REASON"
            if [[ -n "$STABLE_PUBLISHED_VERSION_CODE" ]]; then
              echo "Published stable versionCode: \`${STABLE_PUBLISHED_VERSION_CODE}\`"
            fi
            if [[ -n "$STABLE_UPLOAD_MODE" ]]; then
              echo "Stable upload mode: \`${STABLE_UPLOAD_MODE}\`"
              echo "Stable upload attempts: \`${STABLE_UPLOAD_ATTEMPTS}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
